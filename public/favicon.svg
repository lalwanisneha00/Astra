<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e1424"/>
      <stop offset="1" stop-color="#04060c"/>
    </linearGradient>
    <radialGradient id="glow" cx="32" cy="30" r="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5b8cff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="starGrad" x1="32" y1="12" x2="32" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f4f6ff"/>
      <stop offset="1" stop-color="#8ab4ff"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)" stroke="rgba(255,255,255,0.08)"/>
  <circle cx="32" cy="30" r="22" fill="url(#glow)"/>

  <!-- faint constellation line from the small companion star to the main star -->
  <line x1="43.5" y1="21.5" x2="38.5" y2="26.5" stroke="#8ab4ff" stroke-width="1" stroke-linecap="round" opacity="0.4"/>

  <!-- two tiny background stars -->
  <circle cx="18" cy="46" r="1.4" fill="#f4f6ff" opacity="0.55"/>
  <circle cx="47" cy="45" r="1" fill="#f4f6ff" opacity="0.4"/>

  <!-- small companion star -->
  <path
    d="M46,13 Q47.23,18.77 53,20 Q47.23,21.23 46,27 Q44.77,21.23 39,20 Q44.77,18.77 46,13 Z"
    fill="#8ab4ff"
    opacity="0.85"
  />

  <!-- main sparkle star -->
  <path
    d="M32,12 Q35.5,28.5 52,32 Q35.5,35.5 32,52 Q28.5,35.5 12,32 Q28.5,28.5 32,12 Z"
    fill="url(#starGrad)"
    stroke="#04060c"
    stroke-width="1.25"
    stroke-opacity="0.5"
  />
</svg>
